name: E2E Tests

on:
  schedule:
    - cron: "00 00 * * 4" # every friday at 00:00
  pull_request:
    branches: ["main"]
    paths:
      - "lua/**"
      - "tests/**"
      - "scripts/**"
      - "*.lua"
      - "Makefile"
      - ".github/workflows/e2e-test.yml"
  workflow_call:

jobs:
  e2e-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        nvim-version: [stable, nightly]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim-version }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Verify Java installation
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"

      - name: Make install
        run: make install
        timeout-minutes: 1

      - name: Run E2E tests
        run: make test-e2e
        timeout-minutes: 5
